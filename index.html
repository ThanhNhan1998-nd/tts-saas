<!DOCTYPE html>
<html>
<head>
    <title>ElevenLabs Clone</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0a0f1c;
            color:white;
        }

        .box{
            width:450px;
            margin:50px auto;
            background:#111827;
            padding:25px;
            border-radius:16px;
        }

        textarea{
            width:100%;
            height:130px;
            border-radius:10px;
            padding:10px;
        }

        select,input{
            width:100%;
            margin-top:10px;
            padding:10px;
            border-radius:8px;
        }

        button{
            width:100%;
            margin-top:15px;
            padding:12px;
            border:none;
            border-radius:10px;
            background:linear-gradient(90deg,#22c55e,#06b6d4);
            color:white;
            cursor:pointer;
        }

        button:hover{opacity:0.9;}

        audio{
            width:100%;
            margin-top:15px;
        }

        .title{
            text-align:center;
            font-size:20px;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="title">🔥 ElevenLabs Clone AI</div>

    <form id="form">

        <textarea name="text" placeholder="Enter text..."></textarea>

        <select name="voice">
            <option value="female_north">👩 Female North</option>
            <option value="male_north">👨 Male North</option>
        </select>

        <input type="range" name="rate" min="-20" max="20" value="2">

        <button type="submit">Generate Voice</button>

    </form>

    <audio id="audio" controls></audio>

</div>

<script>

document.getElementById("form").onsubmit = async (e)=>{
    e.preventDefault();

    let data = new FormData(e.target);

    let res = await fetch("/tts", {
        method: "POST",
        body: data
    });

    let out = await res.json();

    if(out.error){
        alert(out.error);
        return;
    }

    let audio = document.getElementById("audio");
    audio.src = out.audio;
    audio.play();
};

</script>

</body>
</html>
